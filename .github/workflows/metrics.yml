name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # This token is for your personal account (to save the image)
          token: ${{ secrets.GITHUB_TOKEN }}
          
          user: anishch16
          base: header, activity, community, repositories, metadata
          
          # Linking the Work Account
          # We provide the token stored in your Secrets
          extra_plugin_token: ${{ secrets.ANISH_WORK_TOKEN }}
          additional_accounts: anishchaulagain16
          
          # This ensures private commits from your work are counted
          config_import_reported: yes
          
          # Visuals: The Combined Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
